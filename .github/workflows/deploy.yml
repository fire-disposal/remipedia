name: 🚀 Fast Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  # ⚡ 极速构建 - 并行优化
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      # 🎯 Rust 工具链 - 带缓存
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # 💾 智能缓存 - 关键路径优化
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 🔍 代码质量检查 - 快速失败
      - name: Code Quality
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      # ⚡ 并行构建 - Release 优化
      - name: Build Release
        run: cargo build --release --locked

      # 🧪 快速测试 - 并行执行
      - name: Run Tests
        run: cargo test --release --parallel

      # 🐳 Docker 构建 - 多阶段优化
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Output image
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT

  # 🚀 部署阶段 - 开箱即用配置
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Production
        env:
          # 🔧 服务器连接配置 - 需要填写
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          
          # 🔑 应用配置 - 需要填写
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          
          # 🐳 容器配置
          COMPOSE_FILE: docker-compose.yml
          IMAGE_TAG: ${{ needs.build.outputs.image }}
        run: |
          echo "🚀 开始部署到生产服务器..."
          
          # 设置SSH密钥
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # 创建部署脚本
          cat > deploy_remote.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "📦 拉取最新代码..."
          cd ~/remipedia || git clone https://github.com/${{ github.repository }}.git ~/remipedia && cd ~/remipedia
          git pull origin main
          
          echo "🔧 创建环境配置文件..."
          cat > .env.prod << ENVEOF
          # 数据库配置
          DB_PASSWORD=${DB_PASSWORD}
          
          # JWT配置
          JWT_SECRET=${JWT_SECRET}
          
          # 应用配置
          APP_ENV=production
          APP_PORT=8000
          APP_TCP_PORT=5858
          
          # 容器镜像
          IMAGE_TAG=${IMAGE_TAG}
          ENVEOF
          
          echo "🐳 更新容器镜像..."
          docker-compose -f $COMPOSE_FILE pull
          
          echo "🚀 启动服务..."
          docker-compose -f $COMPOSE_FILE down --remove-orphans
          docker-compose -f $COMPOSE_FILE up -d
          
          echo "⏳ 等待服务就绪..."
          sleep 30
          
          echo "🔍 健康检查..."
          if curl -f http://localhost:8000/health >/dev/null 2>&1; then
            echo "✅ 应用服务健康检查通过"
          else
            echo "❌ 应用服务健康检查失败"
            docker-compose -f $COMPOSE_FILE logs app
            exit 1
          fi
          
          echo "🧹 清理旧镜像..."
          docker system prune -f
          
          echo "🎉 部署完成！"
          echo "访问地址: http://$SSH_HOST:8000"
          echo "API文档: http://$SSH_HOST:8000/swagger"
          EOF
          
          # 执行远程部署
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST 'bash -s' < deploy_remote.sh
          
          # 清理本地密钥
          rm -f ~/.ssh/deploy_key
          
          echo "✅ 部署成功！"

  # 📊 部署通知
  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Success
        if: needs.build.result == 'success' && needs.deploy.result == 'success'
        run: echo "✅ Deployment successful!"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed!"