database:
  url: "postgresql://postgres:postgres@localhost:5432/remipedia"
  max_connections: 10
  min_connections: 2

server:
  host: "0.0.0.0"
  port: 8000

mqtt:
  broker: "localhost"
  port: 1883
  client_id: "remipedia-server"
  topic_prefix: "remipedia"
  enabled: true

tcp:
  port: 5858
  enabled: true

jwt:
  secret: "your-secret-key-change-in-production"
  expiration_hours: 2
  refresh_expiration_days: 7
