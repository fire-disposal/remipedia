server {
    listen 80;
    listen [::]:80;
    server_name iomt.205716.xyz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iomt.205716.xyz;

    ssl_certificate /etc/letsencrypt/live/iomt.205716.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iomt.205716.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /health {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host $host;
    }
}
