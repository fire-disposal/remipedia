version: '3.8'

services:
  app:
    build: .
    image: ${IMAGE_TAG:-ghcr.io/remipedia/remipedia:latest}
    container_name: remipedia-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:18000:8000"
      - "5858:5858"
    environment:
      - APP_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/remipedia
      - APP_MQTT_BROKER=mqtt
      - APP_MQTT_PORT=1883
      - APP_JWT_SECRET=remipedia-jwt-secret-change-if-needed
      - RUST_LOG=remipedia=info,sqlx=warn
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - remipedia-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: remipedia-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=remipedia
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - remipedia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: remipedia-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
    networks:
      - remipedia-net
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "test", "-m", "test", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  remipedia-net:
    driver: bridge

volumes:
  postgres_data:
  mqtt_data: