name: Deploy

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - run: cargo build --release
      - run: cargo test --release
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deploy to production
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "🚀 开始部署版本 ${{ github.ref_name }}"
          echo "Docker镜像: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}"
          
          # 设置SSH密钥
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # SSH到服务器执行部署
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << ENDSSH
            set -euo pipefail
            
            echo "📦 登录GitHub Container Registry"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            echo "📁 进入部署目录"
            cd $DEPLOY_PATH
            
            echo "📝 更新docker-compose.yml中的镜像版本"
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}|g" docker-compose.yml
            
            echo "🔐 创建环境配置文件"
            cat > .env.prod << EOF
          # 🔑 数据库配置
          DB_PASSWORD=${DB_PASSWORD}
          
          # 🔐 JWT 配置
          JWT_SECRET=${JWT_SECRET}
          
          # 🏷️ 应用配置
          APP_ENV=production
          APP_PORT=8000
          APP_TCP_PORT=5858
          
          # 🐳 Docker镜像配置
          REGISTRY=${REGISTRY}
          IMAGE=${REGISTRY}/${IMAGE}
          IMAGE_TAG=${GITHUB_REF_NAME}
          EOF
            
            echo " 设置环境变量"
            export REGISTRY="${REGISTRY}"
            export IMAGE="${IMAGE}"
            export IMAGE_TAG="${GITHUB_REF_NAME}"
            
            echo "🎯 执行部署脚本"
            chmod +x deploy.sh
            ./deploy.sh deploy
            
            echo "✅ 部署完成"
          ENDSSH
          
          # 清理SSH密钥
          rm -f ~/.ssh/deploy_key
          
          echo "🎉 生产环境部署成功！"
          echo "🌐 应用地址: http://$DEPLOY_HOST:8000"
          echo "📚 API文档: http://$DEPLOY_HOST:8000/swagger"