name: Deploy

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ✅ 使用 SSH Agent（核心改动）
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      # （可选但推荐）避免 known_hosts 问题
      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ✅ 测试 SSH 是否真的可用（强烈建议保留）
      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo 'SSH OK'"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ✅ Deploy（隔离部署到独立目录）
      - name: Deploy via remote Docker
        env:
          DOCKER_HOST: ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
        run: |
          # 设置项目专属目录（自动创建）
          PROJECT_DIR="${{ secrets.DEPLOY_PATH }}/remipedia"
          
          # 创建项目目录并同步配置文件
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p $PROJECT_DIR"
          
          # 生成 .env 文件（包含镜像名）
          echo "IMAGE_TAG=ghcr.io/${{ github.repository }}:latest" > .env
          
          scp docker-compose.yml mosquitto.conf .env \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$PROJECT_DIR/

          # 远程执行部署（在项目目录内）
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
          set -e
          
          # 登录容器仓库
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          
          # 进入项目目录执行部署
          cd $PROJECT_DIR
          
          # 拉取并启动（使用项目专属容器名，避免冲突）
          docker-compose pull
          docker-compose up -d
          
          # 清理旧镜像
          docker image prune -f
          
          echo "✅ Remipedia 部署完成"
          EOF

          echo "✅ 部署完成: http://${{ secrets.DEPLOY_HOST }}:8000"

      # ✅ 健康检查
      - name: Health check
        run: |
          PROJECT_DIR="${{ secrets.DEPLOY_PATH }}/remipedia"
          
          echo "⏳ 等待服务启动..."
          sleep 10
          
          # 尝试多次检查
          for i in {1..5}; do
            echo "🔄 健康检查尝试 $i/5..."
            
            # 通过 SSH 在服务器上执行健康检查
            HEALTH_STATUS=$(ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
              cd $PROJECT_DIR
              
              # 检查 remipedia 容器是否运行
              if ! docker-compose ps --filter 'status=running' --services | grep -q 'app'; then
                echo 'CONTAINER_NOT_RUNNING'
                docker-compose logs --tail=20 app 2>/dev/null || true
                exit 1
              fi
              
              # 检查 HTTP 端点（使用 18000 端口）
              if curl -sf http://127.0.0.1:18000/health > /dev/null 2>&1 || \
                 curl -sf http://127.0.0.1:18000/ > /dev/null 2>&1; then
                echo 'HEALTHY'
              else
                echo 'UNHEALTHY'
                exit 1
              fi
            ") || true
            
            if [ "$HEALTH_STATUS" = "HEALTHY" ]; then
              echo "✅ 健康检查通过！"
              exit 0
            elif [ "$HEALTH_STATUS" = "CONTAINER_NOT_RUNNING" ]; then
              echo "❌ 容器未运行，查看日志："
              ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cd $PROJECT_DIR && docker-compose logs --tail=30 app" || true
              exit 1
            fi
            
            echo "⏳ 服务未就绪，5秒后重试..."
            sleep 5
          done
          
          echo "❌ 健康检查失败，查看日志："
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cd $PROJECT_DIR && docker-compose logs --tail=50 app" || true
          exit 1